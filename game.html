<!DOCTYPE html>
<html>
<head>
<title>Spin & Win</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #000;
  color: gold;
}

/* WHEEL SIZE BIG */
#wheelContainer {
  position: relative;
  width: 90vw;
  max-width: 420px;
  height: 90vw;
  max-height: 420px;
  margin: 30px auto;
}

#wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 10px solid gold;
  transition: transform 5s ease-out;
}

/* POINTER */
#pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-bottom: 30px solid gold;
}

/* BUTTON */
button {
  padding: 15px 25px;
  font-size: 18px;
  background: gold;
  border: none;
  border-radius: 8px;
  color: black;
  font-weight: bold;
}

/* POPUP BIG */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

#popupBox {
  background: black;
  border: 3px solid gold;
  padding: 30px;
  border-radius: 12px;
  width: 80%;
  max-width: 300px;
}

#popupBox h2 {
  color: gold;
  font-size: 22px;
}
</style>

</head>

<body>

<h1>🎡 Spin & Win</h1>

<div id="wheelContainer">
  <div id="pointer"></div>
  <canvas id="wheel"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <h2 id="resultText"></h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<!-- SOUND -->
<audio id="sound" src="spin.mp3"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let size = 400;
canvas.width = size;
canvas.height = size;

let center = size / 2;

let items = [
  "🎧 Headphones",
  "🔊 Speaker",
  "🎧 Bluetooth Neckband",
  "🔌 Charging Cable",
  "🎧 Earbuds"
];

let colors = ["#ff3c3c","#ffaa00","#00c853","#0091ea","#aa00ff"];

/* DRAW WHEEL */
function drawWheel() {
  let arc = (2 * Math.PI) / items.length;

  for (let i = 0; i < items.length; i++) {
    let start = i * arc;

    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(center, center);
    ctx.arc(center, center, center, start, start + arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(start + arc/2);
    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText(items[i], center - 120, 10);
    ctx.restore();
  }
}

drawWheel();

let spinning = false;
let currentRotation = 0;

function spin() {
  if (spinning) return;
  spinning = true;

  let sound = document.getElementById("sound");
  sound.currentTime = 0;
  sound.play().catch(() => {});

  let spinDeg = Math.floor(2000 + Math.random() * 2000);
  currentRotation += spinDeg;

  canvas.style.transform = "rotate(" + currentRotation + "deg)";

  setTimeout(() => {

    let actualDeg = currentRotation % 360;
    let arc = 360 / items.length;

    let index = Math.floor(((360 - actualDeg + 270) % 360) / arc);

    document.getElementById("popup").style.display = "flex";
    document.getElementById("resultText").innerHTML =
      "🎉 Congratulations! 🎁<br>You Win: <b>" + items[index] + "</b>";

    spinning = false;

  }, 5000);
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
