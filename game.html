<!DOCTYPE html>
<html>
<head>
<title>Spin & Win</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #000;
  color: gold;
}

/* BIG WHEEL FULL SCREEN STYLE */
#wheelContainer {
  position: relative;
  width: 90vw;
  height: 90vw;
  max-width: 450px;
  max-height: 450px;
  margin: 40px auto;
}

#wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 10px solid gold;
  transition: transform 5s ease-out;
}

/* POINTER */
#pointer {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 22px solid transparent;
  border-right: 22px solid transparent;
  border-bottom: 35px solid gold;
}

/* BUTTON */
button {
  padding: 16px 35px;
  font-size: 20px;
  background: gold;
  border: none;
  border-radius: 8px;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* POPUP */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
}

#popupBox {
  background: black;
  border: 2px solid gold;
  padding: 30px;
  border-radius: 12px;
}

#popupBox h2 {
  color: gold;
}
</style>

</head>

<body>

<h1>🎡 Spin & Win</h1>

<div id="wheelContainer">
  <div id="pointer"></div>
  <canvas id="wheel"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<!-- RESULT POPUP -->
<div id="popup">
  <div id="popupBox">
    <h2 id="resultText"></h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<audio id="sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let size = 450;
canvas.width = size;
canvas.height = size;

let center = size / 2;

let items = [
  "🎧 Headphones",
  "🔊 Speaker",
  "🎧 Neckband",
  "🔌 Cable",
  "🎧 Earbuds"
];

function drawWheel() {
  let arc = (2 * Math.PI) / items.length;

  for (let i = 0; i < items.length; i++) {
    let start = i * arc;

    ctx.beginPath();
    ctx.fillStyle = ["#ff3c3c","#ffaa00","#00c853","#0091ea","#aa00ff"][i];
    ctx.moveTo(center, center);
    ctx.arc(center, center, center, start, start + arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(start + arc / 2);
    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText(items[i], center - 100, 10);
    ctx.restore();
  }
}

drawWheel();

let spinning = false;

function spin() {
  if (spinning) return;
  spinning = true;

  document.getElementById("sound").play();

  let randomIndex = Math.floor(Math.random() * items.length);
  let arc = 360 / items.length;
  let rotate = 360 * 6 + (randomIndex * arc);

  canvas.style.transform = "rotate(" + rotate + "deg)";

  setTimeout(() => {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("resultText").innerHTML =
      "🎉 Congratulations! You win " + items[randomIndex];
    spinning = false;
  }, 5000);
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
