<!DOCTYPE html>
<html>
<head>
<title>Spin & Win</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(135deg, orange, #ff6a00);
  color: white;
}

h1 {
  margin-top: 20px;
}

/* Wheel */
#wheel {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  border: 8px solid white;
  margin: 30px auto;
  position: relative;
  background: conic-gradient(
    #ffcc00 0deg 120deg,
    #ff4444 120deg 240deg,
    #00ccff 240deg 360deg
  );
  transition: transform 3s ease-out;
}

/* Text on wheel */
.label {
  position: absolute;
  width: 100%;
  text-align: center;
  font-size: 14px;
  font-weight: bold;
  transform-origin: center;
}

.label1 { transform: rotate(60deg) translateY(-110px); }
.label2 { transform: rotate(180deg) translateY(-110px); }
.label3 { transform: rotate(300deg) translateY(-110px); }

/* Pointer */
#pointer {
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 25px solid white;
  margin: auto;
}

/* Button */
button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
}

/* Result */
#result {
  margin-top: 20px;
  font-size: 20px;
}
</style>
</head>

<body>

<h1>🎡 Spin & Win</h1>

<div id="pointer"></div>

<div id="wheel">
  <div class="label label1">🎧 Neckband</div>
  <div class="label label2">📱 Glass</div>
  <div class="label label3">🔌 Protector</div>
</div>

<button onclick="spin()">SPIN</button>

<h2 id="result"></h2>

<!-- Sound -->
<audio id="spinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let count = 0;

function spin() {
  let wheel = document.getElementById("wheel");
  let sound = document.getElementById("spinSound");

  count++;

  sound.play(); // 🔊 sound

  let deg = Math.floor(3000 + Math.random() * 1000);
  wheel.style.transform = "rotate(" + deg + "deg)";

  setTimeout(() => {
    let gift = "";

    if (count % 3 === 0) {
      gift = "🎧 Bluetooth Neckband FREE";
    } else {
      let options = [
        "🔌 Charger Cable Protector",
        "📱 Tempered Glass"
      ];
      gift = options[Math.floor(Math.random() * options.length)];
    }

    document.getElementById("result").innerText = gift;
  }, 3000);
}
</script>

</body>
</html>
