<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let size = 450;
canvas.width = size;
canvas.height = size;

let center = size / 2;

let items = [
  "🎧 Headphones",
  "🔊 Speaker",
  "🎧 Neckband",
  "🔌 Cable",
  "🎧 Earbuds"
];

function drawWheel() {
  let arc = (2 * Math.PI) / items.length;

  for (let i = 0; i < items.length; i++) {
    let start = i * arc;

    ctx.beginPath();
    ctx.fillStyle = ["#ff3c3c","#ffaa00","#00c853","#0091ea","#aa00ff"][i];
    ctx.moveTo(center, center);
    ctx.arc(center, center, center, start, start + arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(start + arc / 2);
    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText(items[i], center - 100, 10);
    ctx.restore();
  }
}

drawWheel();

let spinning = false;
let currentRotation = 0;

function spin() {
  if (spinning) return;
  spinning = true;

  document.getElementById("sound").play();

  let spinDeg = Math.floor(2000 + Math.random() * 2000);
  currentRotation += spinDeg;

  canvas.style.transform = "rotate(" + currentRotation + "deg)";

  setTimeout(() => {
    let actualDeg = currentRotation % 360;

    let arc = 360 / items.length;

    // pointer top pe hai → 270 adjust
    let index = Math.floor(((360 - actualDeg + 270) % 360) / arc);

    document.getElementById("popup").style.display = "flex";
    document.getElementById("resultText").innerHTML =
      "🎉 Congratulations! You win " + items[index];

    spinning = false;
  }, 5000);
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>
