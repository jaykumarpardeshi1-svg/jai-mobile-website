<!DOCTYPE html>
<html>
<head>
<title>Spin & Win</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #000;
  color: gold;
}

/* BIG WHEEL */
#wheel {
  width: 420px;
  height: 420px;
  border-radius: 50%;
  margin: 30px auto;
  border: 10px solid gold;
  position: relative;
  overflow: hidden;
  transition: transform 4s ease-out;
}

/* SECTIONS */
.section {
  position: absolute;
  width: 50%;
  height: 50%;
  transform-origin: 100% 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* COLORS */
.sec1 { background:#ff3c3c; transform: rotate(0deg) skewY(-30deg); }
.sec2 { background:#ffaa00; transform: rotate(72deg) skewY(-30deg); }
.sec3 { background:#00c853; transform: rotate(144deg) skewY(-30deg); }
.sec4 { background:#0091ea; transform: rotate(216deg) skewY(-30deg); }
.sec5 { background:#aa00ff; transform: rotate(288deg) skewY(-30deg); }

/* TEXT BIG */
.section span {
  transform: rotate(30deg);
  font-size: 18px;
  font-weight: bold;
  color: white;
}

/* POINTER */
#pointer {
  width: 0;
  height: 0;
  border-left: 22px solid transparent;
  border-right: 22px solid transparent;
  border-bottom: 35px solid gold;
  margin: auto;
}

/* BUTTON */
button {
  padding: 16px 35px;
  font-size: 20px;
  background: gold;
  border: none;
  border-radius: 8px;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* RESULT */
#result {
  margin-top: 20px;
  font-size: 22px;
  font-weight: bold;
}
</style>

</head>

<body>

<h1>🎡 Spin & Win</h1>

<div id="pointer"></div>

<div id="wheel">

  <div class="section sec1"><span>🎧 Headphones</span></div>
  <div class="section sec2"><span>🔊 Speaker</span></div>
  <div class="section sec3"><span>🎧 Neckband</span></div>
  <div class="section sec4"><span>🔌 Cable</span></div>
  <div class="section sec5"><span>🎧 Earbuds</span></div>

</div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<audio id="sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let spinning = false;

let gifts = [
  "🎧 Headphones",
  "🔊 Speaker",
  "🎧 Bluetooth Neckband",
  "🔌 Charging Cable",
  "🎧 Earbuds"
];

function spin() {
  if (spinning) return;
  spinning = true;

  let wheel = document.getElementById("wheel");
  let sound = document.getElementById("sound");

  sound.play();

  let randomIndex = Math.floor(Math.random() * gifts.length);

  let deg = 360 * 6 + (randomIndex * 72); 
  wheel.style.transform = "rotate(" + deg + "deg)";

  setTimeout(() => {
    document.getElementById("result").innerHTML =
      "🎉 Congratulations! You win " + gifts[randomIndex];
    spinning = false;
  }, 4000);
}
</script>

</body>
</html>
